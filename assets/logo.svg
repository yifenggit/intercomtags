<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 圆角矩形背景 -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)"/>
  
  <!-- 标签图标 -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- 主体标签 -->
    <path d="M-200,-120 
             L120,-120 
             L200,-40 
             L200,40 
             L120,120 
             L-200,120 
             Q-240,120 -240,80 
             L-240,-80 
             Q-240,-120 -200,-120 Z" 
          fill="url(#tag)"/>
    
    <!-- 标签孔 -->
    <circle cx="-160" cy="0" r="32" fill="#667eea"/>
    
    <!-- 三条横线（代表列表/标签） -->
    <rect x="-80" y="-48" width="200" height="20" rx="10" fill="#667eea" opacity="0.9"/>
    <rect x="-80" y="-10" width="160" height="20" rx="10" fill="#764ba2" opacity="0.8"/>
    <rect x="-80" y="28" width="120" height="20" rx="10" fill="#667eea" opacity="0.7"/>
  </g>
</svg>